<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful - Hotel Miranda</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        .success-card { background: white; padding: 3rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        .success-icon { width: 80px; height: 80px; background: #22c55e; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 1.5rem auto; }
        .success-card h1 { color: #0f1a2c; margin-bottom: 0.5rem; }
        .success-card p { color: #64748b; margin-bottom: 2rem; }
        .receipt-box { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 1.5rem; border-radius: 5px; text-align: left; margin-bottom: 2rem; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.75rem;}
        .receipt-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; font-weight: bold; font-size: 1.2rem; color: #f6ac0f; }
        .btn-home { background: #0f1a2c; color: white; padding: 10px 24px; border-radius: 5px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-home:hover { background: #f6ac0f; color: #0f1a2c; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Booking Confirmed!</h1>
        <p>Thank you for choosing Hotel Miranda. Here is your receipt:</p>

        <div class="receipt-box" id="receiptBox">
            Loading receipt details...
        </div>

        <a href="../index.html" class="btn-home">Back to Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(sessionStorage.getItem('bookingReceipt'));
            
            if (data) {
                document.getElementById('receiptBox').innerHTML = `
                    <div class="receipt-row"><span>Booking ID:</span> <strong>${data.code}</strong></div>
                    <div class="receipt-row"><span>Guest Name:</span> <strong>${data.name}</strong></div>
                    <div class="receipt-row"><span>Room Type:</span> <strong>${data.room}</strong></div>
                    <div class="receipt-row"><span>Check-in:</span> <strong>${data.checkIn}</strong></div>
                    <div class="receipt-row"><span>Duration:</span> <strong>${data.nights} night(s)</strong></div>
                    <div class="receipt-row"><span>Total Amount:</span> <span>$${data.total}</span></div>
                `;
            } else {
                document.getElementById('receiptBox').innerHTML = "Receipt data not found. Please contact our support team.";
            }
        });
    </script>
</body>
</html>
