<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - Hotel Miranda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #0f1a2c; padding: 2rem; display: flex; justify-content: center; }
        .checkout-container { display: flex; gap: 2rem; max-width: 1000px; width: 100%; flex-wrap: wrap; }
        .box { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        h2 { font-family: 'Playfair Display', serif; color: #0f1a2c; margin-bottom: 1.5rem; border-bottom: 2px solid #f6ac0f; padding-bottom: 0.5rem; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #64748b; }
        .detail-row strong { color: #0f1a2c; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; color: #f6ac0f; margin-top: 1rem; border-top: 1px solid #e2e8f0; padding-top: 1rem; }
        
        /* Payment Methods */
        .payment-method { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .payment-method:hover { border-color: #f6ac0f; background: #fffcf5; }
        .payment-method.active { border-color: #f6ac0f; border-width: 2px; background: #fffcf5; }
        .payment-method img { width: 40px; height: 40px; border-radius: 5px; }
        
        .btn-pay { width: 100%; padding: 1rem; background: #0f1a2c; color: white; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: 0.3s; }
        .btn-pay:hover { background: #f6ac0f; color: #0f1a2c; }
        
        /* QR Code Area */
        #qr-section { display: none; text-align: center; margin-top: 2rem; }
        #qr-image { width: 200px; height: 200px; margin: 1rem auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #f6ac0f; border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="box">
            <h2>Chi tiết hóa đơn</h2>
            <div id="bill-details">
                Đang tải dữ liệu...
            </div>
        </div>

        <div class="box">
            <h2>Phương thức thanh toán</h2>
            
            <div class="payment-method active" onclick="selectMethod('MoMo')" id="method-MoMo">
                <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" alt="MoMo">
                <strong style="font-size: 1.1rem;">Ví điện tử MoMo</strong>
            </div>
            
            <div class="payment-method" onclick="selectMethod('VNPay')" id="method-VNPay">
                <img src="https://vnpay.vn/s1/vnpay/logo.svg" alt="VNPay" style="background: #0f1a2c; padding: 5px;">
                <strong style="font-size: 1.1rem;">VNPAY QR</strong>
            </div>

            <button class="btn-pay" id="btnPay" onclick="processPayment()">Thanh toán ngay</button>

            <div id="qr-section">
                <h3 style="color: #64748b; margin-bottom: 10px;">Quét mã QR để thanh toán</h3>
                <div id="loading-spinner" class="spinner"></div>
                <img id="qr-image" src="" alt="QR Code">
                <button class="btn-pay" id="btn-complete" style="display: none; background: #22c55e;" onclick="finishOrder()">Tôi đã thanh toán thành công</button>
            </div>
        </div>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
